name: figures

# Regenerates F1 (global MIM) and F3 (hub subnetwork) on every push that
# touches the curation, scripts, or the rendering pipeline itself, and
# uploads the SVG + 300-dpi PNG outputs as workflow artefacts so a
# reviewer / co-author can compare them against the committed versions
# without re-running the pipeline locally.
#
# F2 / F2_multi are not regenerated here because they depend on the
# multi-dataset overlay (≈ 25 min, ~600 MB Tabib download); that lives
# in a separate, manually-triggered job once Sprint S1.5 lands.

on:
  push:
    paths:
      - "scripts/render_figures.py"
      - "scripts/network_analysis.py"
      - "curation/celldesigner/SSc_MIM_integrated.xml"
      - "analysis/network/hubs.tsv"
      - "analysis/overlay/druggable_hubs.tsv"
      - ".github/workflows/figures.yml"
  pull_request:
    paths:
      - "scripts/render_figures.py"
      - "scripts/network_analysis.py"
      - "curation/celldesigner/SSc_MIM_integrated.xml"
      - "analysis/network/hubs.tsv"
      - "analysis/overlay/druggable_hubs.tsv"
      - ".github/workflows/figures.yml"
  workflow_dispatch: {}

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install figure-rendering stack
        run: |
          python -m pip install --upgrade pip
          # Minimal stack to run render_figures.py: libSBML is parsed
          # via stdlib ElementTree, so only matplotlib + networkx +
          # pandas are required.
          pip install \
            "matplotlib>=3.8" "networkx>=3.2" \
            "pandas>=2.2" "numpy>=1.26"

      - name: Render F1 + F3
        run: |
          python scripts/render_figures.py --out-dir build/figures

      - name: Upload rendered figures
        uses: actions/upload-artifact@v4
        with:
          name: figures-${{ github.sha }}
          path: |
            build/figures/F1_global_MIM.svg
            build/figures/F1_global_MIM.png
            build/figures/F3_druggable_targets.svg
            build/figures/F3_druggable_targets.png
          retention-days: 14
          if-no-files-found: error
