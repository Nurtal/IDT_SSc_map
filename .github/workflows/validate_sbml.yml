name: validate_sbml

on:
  push:
    paths:
      - "curation/celldesigner/**.xml"
      - ".github/workflows/validate_sbml.yml"
      - "scripts/validate_sbml.py"
  pull_request:
    paths:
      - "curation/celldesigner/**.xml"
      - ".github/workflows/validate_sbml.yml"
      - "scripts/validate_sbml.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install libSBML
        run: |
          python -m pip install --upgrade pip
          pip install python-libsbml==5.20.4

      - name: Validate all CellDesigner XML files
        run: |
          python scripts/validate_sbml.py curation/celldesigner
