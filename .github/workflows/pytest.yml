name: pytest

on:
  push:
    paths:
      - "scripts/**.py"
      - "pyproject.toml"
      - ".github/workflows/pytest.yml"
  pull_request:
    paths:
      - "scripts/**.py"
      - "pyproject.toml"
      - ".github/workflows/pytest.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + test dependencies
        run: |
          python -m pip install --upgrade pip
          # Match the pyproject runtime stack; pytest from the [dev] extra.
          pip install \
            "numpy>=1.26" "pandas>=2.2" "scipy>=1.11" \
            "statsmodels>=0.14" "scikit-learn" "matplotlib>=3.8" \
            "networkx>=3.2" pytest

      - name: Run pytest
        run: |
          python -m pytest -q
